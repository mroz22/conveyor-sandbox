name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    name: Acceptance criteria (PoC gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HTML well-formedness sanity check
        run: |
          python3 - <<'PY'
          import sys
          from html.parser import HTMLParser

          VOID = {"area","base","br","col","embed","hr","img","input",
                  "link","meta","param","source","track","wbr"}

          class Check(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.stack = []
                  self.errors = []
              def handle_starttag(self, tag, attrs):
                  if tag not in VOID:
                      self.stack.append(tag)
              def handle_endtag(self, tag):
                  if tag in VOID:
                      return
                  if not self.stack or self.stack[-1] != tag:
                      self.errors.append(f"mismatched </{tag}> (open: {self.stack[-3:]})")
                  else:
                      self.stack.pop()

          html = open("index.html", encoding="utf-8").read()
          c = Check()
          c.feed(html)
          if c.stack:
              c.errors.append(f"unclosed tags: {c.stack}")
          if c.errors:
              print("HTML structure errors:")
              for e in c.errors:
                  print("  -", e)
              sys.exit(1)
          print("index.html is well-formed.")
          PY

      - name: Run acceptance-criteria verification
        run: bash scripts/verify.sh
