<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="Kresba klece s domečkem a tunely na hraní">
  <rect width="480" height="320" fill="#fdf6ec"/>
  <!-- klec -->
  <rect x="40" y="90" width="400" height="190" rx="10" fill="#fff" stroke="#8a6a3b" stroke-width="4"/>
  <!-- podlaha klece -->
  <rect x="44" y="250" width="392" height="30" rx="4" fill="#e7d3a8"/>
  <!-- mrize -->
  <g stroke="#cdb892" stroke-width="3">
    <line x1="90" y1="94" x2="90" y2="250"/>
    <line x1="140" y1="94" x2="140" y2="250"/>
    <line x1="190" y1="94" x2="190" y2="250"/>
    <line x1="240" y1="94" x2="240" y2="250"/>
    <line x1="290" y1="94" x2="290" y2="250"/>
    <line x1="340" y1="94" x2="340" y2="250"/>
    <line x1="390" y1="94" x2="390" y2="250"/>
  </g>
  <!-- domecek -->
  <rect x="70" y="190" width="90" height="60" fill="#c98b5a"/>
  <polygon points="60,190 170,190 115,150" fill="#a4673a"/>
  <rect x="100" y="212" width="30" height="38" rx="6" fill="#5e3c20"/>
  <!-- tunel -->
  <path d="M250 250 q40 -60 110 0" fill="none" stroke="#7bb59a" stroke-width="22" stroke-linecap="round"/>
  <ellipse cx="250" cy="250" rx="11" ry="13" fill="#5d9b80"/>
  <ellipse cx="360" cy="250" rx="11" ry="13" fill="#5d9b80"/>
  <!-- morce vykukuje z tunelu -->
  <g>
    <circle cx="360" cy="244" r="14" fill="#caa06a"/>
    <circle cx="364" cy="240" r="2.5" fill="#3a2a18"/>
    <ellipse cx="355" cy="234" rx="4" ry="6" fill="#8a5a2c"/>
  </g>
  <!-- seno -->
  <path d="M180 244 q10 -16 20 0 q10 -14 18 0" fill="none" stroke="#e0c067" stroke-width="4"/>
</svg>
